global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Producer (host: pnpm run start:producer, PORT=3000, METRICS_ENABLED=true)
  - job_name: mealio-producer
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: producer

  # Consumer (host: pnpm run start:consumer, METRICS_PORT=9091, METRICS_ENABLED=true)
  - job_name: mealio-consumer
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          service: consumer

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Producer (docker/compose-producer + compose-monitoring: producer:PORT — entrypoint에서 치환)
  - job_name: mealio-producer
    metrics_path: /metrics
    static_configs:
      - targets: ['producer:3000']
        labels:
          service: producer

  # Consumer (Compose: consumer:9100 — METRICS_PORT env와 동기화)
  - job_name: mealio-consumer
    metrics_path: /metrics
    static_configs:
      - targets: ['consumer:9100']
        labels:
          service: consumer

  # Pushgateway (recipe-ingestion CLI batch job metrics)
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

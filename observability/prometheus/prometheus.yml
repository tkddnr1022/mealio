global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Producer (docker/compose-server + compose-monitoring: producer:PRODUCER_PORT — entrypoint에서 치환)
  - job_name: mealio-producer
    metrics_path: /metrics
    static_configs:
      - targets: ['producer:3000']
        labels:
          service: producer

  # Consumer (Compose: consumer:9091 — CONSUMER_METRICS_PORT env와 동기화)
  - job_name: mealio-consumer
    metrics_path: /metrics
    static_configs:
      - targets: ['consumer:9091']
        labels:
          service: consumer

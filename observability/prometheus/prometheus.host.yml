# Host-run producer/consumer (dev: docker/compose-monitoring without compose-producer/compose-consumer)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: mealio-producer
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: producer

  - job_name: mealio-consumer
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9101"]
        labels:
          service: consumer

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["host.docker.internal:9091"]

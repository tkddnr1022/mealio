apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-ops
    receivers:
      - uid: slack-ops-receiver
        type: slack
        disableResolveMessage: false
        settings:
          url: ${SLACK_OPS_WEBHOOK_URL}
          recipient: "#ops"
          title: "[Mealio Ops] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})"
          text: |
            *Status*: {{ .Status }}
            *Alert*: {{ .CommonLabels.alertname }}
            *Service*: {{ .CommonLabels.service }}
            *Runbook*: {{ .CommonLabels.runbook_url }}
            {{ range .Alerts }}
            Rule: {{ or .Labels.rulename .Labels.alertname }}
            Topic: {{ .Labels.topic }}
            Value: {{ .ValueString }}
            {{ end }}

  - orgId: 1
    name: slack-product
    receivers:
      - uid: slack-product-receiver
        type: slack
        disableResolveMessage: false
        settings:
          url: ${SLACK_PRODUCT_WEBHOOK_URL}
          recipient: "#product"
          title: "[Mealio Product] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})"
          text: |
            *Status*: {{ .Status }}
            *KPI*: {{ .CommonLabels.alertname }}
            *Service*: {{ .CommonLabels.service }}
            *Runbook*: {{ .CommonLabels.runbook_url }}
            {{ range .Alerts }}
            Rule: {{ or .Labels.rulename .Labels.alertname }}
            Value: {{ .ValueString }}
            {{ end }}

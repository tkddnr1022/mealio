apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-ops
    receivers:
      - uid: slack-ops-receiver
        type: slack
        disableResolveMessage: false
        settings:
          # 실 운영 시 Slack webhook URL 설정
          url: ${SLACK_OPS_WEBHOOK_URL}
          recipient: "#ops"
          title: "[Mealio Ops] {{ .CommonLabels.alertname }}"
          text: |
            *Status*: {{ .Status }}
            *Alert*: {{ .CommonLabels.alertname }}
            {{ range .Alerts }}
            Topic: {{ .Labels.topic }}
            Value: {{ .ValueString }}

  - orgId: 1
    name: slack-product
    receivers:
      - uid: slack-product-receiver
        type: slack
        disableResolveMessage: false
        settings:
          url: ${SLACK_PRODUCT_WEBHOOK_URL}
          recipient: "#product"
          title: "[Mealio Product] {{ .CommonLabels.alertname }}"
          text: |
            *Status*: {{ .Status }}
            *KPI*: {{ .CommonLabels.alertname }}
            {{ range .Alerts }}
            Value: {{ .ValueString }}

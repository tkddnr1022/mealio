apiVersion: 1

# Always-on interval used by notification policy to suppress DatasourceNoData /
# DatasourceError Slack delivery (alerts remain visible in Grafana UI).
muteTimes:
  - orgId: 1
    name: suppress-datasource-meta-alerts
    time_intervals:
      - location: UTC
        weekdays:
          - monday
          - tuesday
          - wednesday
          - thursday
          - friday
          - saturday
          - sunday
        times:
          - start_time: "00:00"
            end_time: "24:00"

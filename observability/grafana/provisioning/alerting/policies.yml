apiVersion: 1

policies:
  - orgId: 1
    receiver: slack-ops
    group_by: ["alertname", "topic"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: slack-product
        matchers:
          - label: team
            match: "="
            value: product
        group_by: ["alertname"]
        repeat_interval: 12h

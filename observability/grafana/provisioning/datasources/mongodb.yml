apiVersion: 1

datasources:
  - name: MongoDB
    uid: mongodb
    type: haohanyang-mongodb-datasource
    access: proxy
    jsonData:
      connectionStringScheme: mongodb
      host: mongodb:27017
      database: devdb
      authType: username-password
      username: devuser
      authDb: admin
    secureJsonData:
      password: devpassword
    editable: true

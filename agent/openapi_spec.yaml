  /health:
    get:
      tags:
        - Internal
      summary: 애플리케이션 liveness 체크
      description: |
        애플리케이션 프로세스가 살아있는지(liveness) 확인합니다.
        Kubernetes Liveness Probe 등에서 사용합니다.
      security: []
      responses:
        '200':
          description: 애플리케이션이 기동 중(liveness ok)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  timestamp:
                    type: string
                    format: date-time

  /ready:
    get:
      tags:
        - Internal
      summary: 애플리케이션 readiness 체크
      description: |
        애플리케이션이 트래픽을 받을 준비가 되었는지(readiness) 확인합니다.
        PostgreSQL, MongoDB 등 주요 의존성의 연결 상태를 종합해 상태를 반환합니다.
      security: []
      responses:
        '200':
          description: 의존성 상태에 따른 readiness 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  timestamp:
                    type: string
                    format: date-time
                  details:
                    type: object
                    properties:
                      app:
                        type: string
                        enum: [ok, degraded]
                      postgres:
                        type: string
                        enum: [ok, degraded, unknown]
                      mongodb:
                        type: string
                        enum: [ok, degraded, unknown]

  /internal/v1/events:
    post:
      tags:
        - Internal
      summary: 이벤트 로그 기록
      description: 내부 시스템용 이벤트 로깅 API
      security:
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventLog'
      responses:
        '202':
          description: 이벤트 수신 완료 (비동기 처리)
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
                    example: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: JWT 토큰이 포함된 HttpOnly 쿠키
    internalApiKey:
      type: apiKey
      in: header
      name: X-Internal-API-Key
      description: 내부 API 인증 키

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 사용자 ID
        email:
          type: string
          format: email
          description: 이메일
        nickname:
          type: string
          description: 닉네임
      example:
        id: 123
        email: user@example.com
        nickname: 요리왕

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            createdAt:
              type: string
              format: date-time
              description: 가입일시

    RecipeSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          maxLength: 100
        description:
          type: string
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          description: 난이도 (1~5)
        cookTime:
          type: integer
          description: 조리시간 (분)
        imageUrl:
          type: string
          format: uri
          nullable: true
        servings:
          type: integer
          description: 인분 수
        viewCount:
          type: integer
          description: 조회수
        isPublished:
          type: boolean
          description: 공개 여부
        createdAt:
          type: string
          format: date-time
      example:
        id: 456
        title: 김치볶음밥
        description: 간단하고 맛있는 김치볶음밥
        difficulty: 1
        cookTime: 15
        imageUrl: https://example.com/images/recipe456.jpg
        createdAt: "2025-01-10T10:30:00Z"

    RecipeDetail:
      allOf:
        - $ref: '#/components/schemas/RecipeSummary'
        - type: object
          properties:
            categoryId:
              type: integer
              format: int64
              description: 레시피 카테고리 ID
            categoryName:
              type: string
              description: 레시피 카테고리 표시명
            instructions:
              type: array
              items:
                type: object
                properties:
                  step:
                    type: integer
                  content:
                    type: string
                  imageUrl:
                    type: string
                    format: uri
                    nullable: true
            ingredients:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
                  amount:
                    type: number
                    format: float
                  unit:
                    type: string
                  isOptional:
                    type: boolean

    RecipeCategory:
      type: object
      properties:
        id:
          type: integer
          format: int64
        key:
          type: string
          maxLength: 50
          description: 불변 카테고리 키
          example: KOREAN
        name:
          type: string
          maxLength: 100
          description: 카테고리 표시명
          example: 한식
        displayOrder:
          type: integer
          description: 카테고리 노출 정렬 순서
          example: 1
        isActive:
          type: boolean
          description: 카테고리 사용 여부
          example: true
      example:
        id: 1
        key: KOREAN
        name: 한식
        displayOrder: 1
        isActive: true

    Ingredient:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 100
        categoryId:
          type: integer
          description: 재료 카테고리 ID
      example:
        id: 789
        name: 양파
        categoryId: 1

    IngredientCategory:
      type: object
      properties:
        id:
          type: integer
          format: int64
        key:
          type: string
          maxLength: 50
          description: 불변 카테고리 키
          example: VEGETABLE
        name:
          type: string
          maxLength: 100
          description: 카테고리 표시명
          example: 채소
        displayOrder:
          type: integer
          description: 카테고리 노출 정렬 순서
          example: 1
        isActive:
          type: boolean
          description: 카테고리 사용 여부
          example: true
      example:
        id: 1
        key: VEGETABLE
        name: 채소
        displayOrder: 1
        isActive: true

    UserIngredientEntry:
      type: object
      required:
        - id
        - name
        - categoryId
      properties:
        id:
          type: integer
          format: int64
          description: 재료 ID
        name:
          type: string
          description: 재료명
        categoryId:
          type: integer
          format: int64
          nullable: true
          description: 재료 카테고리 ID (마스터에 없는 ID는 null)

    UserIngredientList:
      type: object
      properties:
        ingredients:
          type: array
          description: 보유 재료 (id, name, categoryId)
          items:
            $ref: '#/components/schemas/UserIngredientEntry'
        favoriteIngredients:
          type: array
          description: 즐겨찾기 재료 (id, name, categoryId)
          items:
            $ref: '#/components/schemas/UserIngredientEntry'

    ChatbotResponse:
      type: object
      properties:
        conversationId:
          type: string
        message:
          type: string
        suggestedRecipes:
          type: array
          nullable: true
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              title:
                type: string
              categoryId:
                type: integer
                format: int64
                description: 레시피 카테고리 ID
              categoryName:
                type: string
                description: 레시피 카테고리 표시명
              matchScore:
                type: integer
                minimum: 0
                maximum: 100
      example:
        conversationId: conv_abc123
        message: 김치볶음밥은 어떠세요? 집에 있는 재료로 15분이면 완성할 수 있습니다.
        suggestedRecipes:
          - id: 456
            title: 김치볶음밥
            categoryId: 1
            categoryName: 한식
            matchScore: 95

    ConversationHistory:
      type: object
      description: 대화 히스토리 (추천 레시피는 ID 배열만 반환, 상세는 POST /api/v1/recipes/summaries 벌크 조회)
      properties:
        conversationId:
          type: string
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant, system]
              message:
                type: string
              suggestedRecipeIds:
                type: array
                nullable: true
                description: 추천 레시피 ID 목록 (assistant 메시지). 상세는 POST /api/v1/recipes/summaries 벌크 조회
                items:
                  type: integer
                  format: int64
              createdAt:
                type: string
                format: date-time

    ConversationList:
      type: object
      description: 해당 유저의 대화 목록 (conversationId 목록, 최신 대화 순)
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              conversationId:
                type: string
                description: 대화 ID
              lastMessageAt:
                type: string
                format: date-time
                description: 해당 대화의 마지막 메시지 시각
        nextCursor:
          type: string
          nullable: true
          description: 다음 페이지가 있으면 값이 있으며, 다음 요청의 cursor 파라미터로 사용

    EventLog:
      type: object
      required:
        - type
        - actor
      properties:
        type:
          type: string
          description: |
            이벤트 타입 (예: recipe.view, recipe.like, search.query, user.signup, ingredient.add, chatbot.message)
        actor:
          type: object
          properties:
            type:
              type: string
              description: 이벤트 주체 타입 (user, system, admin)
            userId:
              type: integer
              format: int64
            ipAddress:
              type: string
            userAgent:
              type: string
        entity:
          type: object
          nullable: true
          properties:
            type:
              type: string
            id:
              type: integer
              format: int64
            name:
              type: string
        payload:
          type: object
          nullable: true
        metadata:
          type: object
          nullable: true
          properties:
            platform:
              type: string
            version:
              type: string
            source:
              type: string
            referrer:
              type: string
            extra:
              type: object
              additionalProperties: true

    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
      example:
        page: 1
        size: 20
        total: 150
        totalPages: 8

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              nullable: true
      example:
        error:
          code: VALIDATION_ERROR
          message: Invalid request parameters
          details:
            field: nickname
            issue: Length must be between 2 and 20 characters

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: BAD_REQUEST
              message: Invalid request parameters

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Authentication required

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found

    TooManyRequests:
      description: 요청 횟수 제한 초과
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Too many requests. Please try again later.

    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: INTERNAL_SERVER_ERROR
              message: An unexpected error occurred
openapi: 3.0.3
info:
  title: Recipe Service API
  description: |
    레시피 추천 및 재료 관리 서비스 API
    
    ## 인증 방식
    - Cookie 기반 JWT 인증 (HttpOnly, Secure, SameSite=Strict)
    - 소셜 로그인: 백엔드 주도 OAuth. 클라이언트는 GET /api/v1/auth/{provider} 진입만 하며, 이후 리다이렉트·토큰 교환·JWT 발급은 백엔드에서 처리
    
    ## 주요 기능
    - 소셜 로그인 (카카오, 구글, 네이버)
    - 레시피 조회 및 검색
    - 사용자 재료 관리
    - AI 챗봇 레시피 추천
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.example.com
    description: Production server
  - url: https://staging-api.example.com
    description: Staging server
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Authentication
    description: 인증 관련 API
  - name: User
    description: 사용자 관련 API
  - name: Recipe
    description: 레시피 관련 API
  - name: Ingredient
    description: 재료 관련 API
  - name: UserIngredient
    description: 사용자 재료함 관련 API
  - name: Chatbot
    description: AI 챗봇 관련 API
  - name: Internal
    description: 내부 API

security:
  - cookieAuth: []

paths:
  /api/v1/auth/{provider}:
    get:
      tags:
        - Authentication
      summary: OAuth 로그인 진입 (소셜)
      description: |
        백엔드 주도 OAuth 진입. 클라이언트가 이 URL로 이동(또는 리다이렉트)하면 서버가 Provider 인증 페이지로 302 리다이렉트한다.
        인증 완료 후 Provider가 백엔드 콜백 URL로 리다이렉트하고, 백엔드가 Code 교환·JWT 발급 후 클라이언트 로그인 성공 URL로 302 + Set-Cookie로 응답한다.
        Client ID, Secret, Scope, Redirect URI는 백엔드에서만 관리한다.
      operationId: getAuthProvider
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          description: OAuth Provider 식별자
          schema:
            type: string
            enum: [google, kakao, naver]
      responses:
        '302':
          description: Provider 인증 URL로 리다이렉트 (Location 헤더)
          headers:
            Location:
              description: Provider 인증 페이지 URL
              schema:
                type: string
                example: "https://accounts.google.com/o/oauth2/v2/auth?client_id=..."
        '400':
          description: 잘못된 provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/{provider}/callback:
    get:
      tags:
        - Authentication
      summary: OAuth 콜백 (Provider → 백엔드)
      description: |
        Provider 인증 완료 후 Provider가 리다이렉트하는 백엔드 URL.
        클라이언트가 직접 호출하지 않으며, GET /api/v1/auth/{provider} 진입 후 브라우저가 Provider를 거쳐 이 URL로 이동한다.
        서버가 Authorization Code로 Access Token 교환 → 사용자 정보 조회 → 사용자 생성/조회 → JWT 발급 후
        클라이언트 로그인 성공 URL로 302 리다이렉트하며 응답 헤더에 Set-Cookie로 accessToken을 담아 전달한다.
      operationId: getAuthProviderCallback
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          description: OAuth Provider 식별자 (진입 시 사용한 값과 동일)
          schema:
            type: string
            enum: [google, kakao, naver]
        - name: code
          in: query
          required: true
          description: Provider가 전달하는 Authorization Code
          schema:
            type: string
        - name: state
          in: query
          required: false
          description: CSRF 방지용 state (진입 시 서버가 생성해 전달한 값)
          schema:
            type: string
      responses:
        '302':
          description: 로그인 성공. 클라이언트 로그인 성공 URL로 리다이렉트 + Set-Cookie(accessToken)
          headers:
            Location:
              description: 프론트엔드 로그인 성공 URL (환경 변수로 설정)
              schema:
                type: string
                example: "https://app.example.com"
            Set-Cookie:
              description: JWT accessToken (HttpOnly, Secure, SameSite=Lax)
              schema:
                type: string
                example: "accessToken=eyJhbGc...; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=3600"
        '401':
          description: OAuth 인증 실패 (code 무효, 사용자 거부 등)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: 이메일/크레덴셜 로그인
      description: |
        이메일·비밀번호 등 크레덴셜 로그인용. 소셜 로그인은 GET /api/v1/auth/{provider} 를 사용한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: 이메일
                password:
                  type: string
                  format: password
                  description: 비밀번호
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: JWT 토큰이 포함된 쿠키
              schema:
                type: string
                example: "accessToken=eyJhbGc...; Path=/; HttpOnly; Secure; SameSite=Strict; Max-Age=3600"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: 토큰 갱신
      description: Refresh Token을 사용하여 Access Token 갱신
      security:
        - cookieAuth: []
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      responses:
        '200':
          description: 토큰 갱신 성공
          headers:
            Set-Cookie:
              description: 갱신된 JWT 토큰
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: 로그아웃
      description: 로그아웃 및 쿠키 삭제
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      responses:
        '204':
          description: 로그아웃 성공
          headers:
            Set-Cookie:
              description: 쿠키 삭제
              schema:
                type: string
                example: "accessToken=; Path=/; HttpOnly; Secure; SameSite=Strict; Max-Age=0"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me:
    get:
      tags:
        - User
      summary: 내 프로필 조회
      description: 현재 로그인한 사용자의 프로필 정보 조회
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      responses:
        '200':
          description: 프로필 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/me/nickname:
    patch:
      tags:
        - User
      summary: 닉네임 수정
      description: 사용자 닉네임 수정
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nickname
              properties:
                nickname:
                  type: string
                  minLength: 2
                  maxLength: 20
                  description: 새로운 닉네임
            example:
              nickname: "요리왕"
      responses:
        '200':
          description: 닉네임 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  nickname:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes:
    get:
      tags:
        - Recipe
      summary: 레시피 목록 조회
      description: 페이지네이션을 지원하는 레시피 목록 조회
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: accessToken
          in: cookie
          required: false
          description: JWT 액세스 토큰 (선택사항)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: page
          in: query
          description: 페이지 번호
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: 페이지 크기
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: difficulty
          in: query
          description: 난이도 필터 (1~5)
          schema:
            type: array
            items:
              type: integer
              minimum: 1
              maximum: 5
          style: form
          explode: false
        - name: cookTime
          in: query
          description: 최대 조리시간 (분)
          schema:
            type: integer
            minimum: 1
        - name: sort
          in: query
          description: 정렬 기준
          schema:
            type: string
            enum: [latest, cookTime, difficulty]
            default: latest
      responses:
        '200':
          description: 레시피 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/categories:
    get:
      tags:
        - Recipe
      summary: 레시피 카테고리 목록 조회
      description: 활성화된 레시피 카테고리 목록 조회
      security:
        - cookieAuth: []
        - {}
      responses:
        '200':
          description: 레시피 카테고리 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeCategory'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/summaries:
    post:
      tags:
        - Recipe
      summary: 레시피 요약 정보 벌크 조회
      description: ID 목록으로 레시피 요약 정보(RecipeSummary)를 한 번에 조회. 챗봇 대화 히스토리의 suggestedRecipeIds 상세 표시 등에 사용.
      security:
        - cookieAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                    format: int64
                  maxItems: 100
                  example: [1, 2, 3]
      responses:
        '200':
          description: 조회 성공 (요청한 ID 중 존재·공개된 레시피만 반환)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/{recipeId}:
    get:
      tags:
        - Recipe
      summary: 레시피 상세 조회
      description: 특정 레시피의 상세 정보 조회
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: accessToken
          in: cookie
          required: false
          description: JWT 액세스 토큰 (선택사항)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: recipeId
          in: path
          required: true
          description: 레시피 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 레시피 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/search:
    get:
      tags:
        - Recipe
      summary: 레시피 검색
      description: 키워드로 레시피 검색
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: accessToken
          in: cookie
          required: false
          description: JWT 액세스 토큰 (선택사항)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: q
          in: query
          required: true
          description: 검색 키워드
          schema:
            type: string
            minLength: 1
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/ingredients:
    get:
      tags:
        - Ingredient
      summary: 재료 목록 조회
      description: 카테고리별 재료 목록 조회
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
        - name: category
          in: query
          description: 재료 카테고리 ID
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: 재료 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ingredient'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/ingredients/categories:
    get:
      tags:
        - Ingredient
      summary: 재료 카테고리 목록 조회
      description: 활성화된 재료 카테고리 목록 조회
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      responses:
        '200':
          description: 재료 카테고리 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngredientCategory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/ingredients/search:
    get:
      tags:
        - Ingredient
      summary: 재료 검색
      description: 키워드로 재료 검색
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
        - name: q
          in: query
          required: true
          description: 검색 키워드
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ingredient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/me/ingredients:
    get:
      tags:
        - UserIngredient
      summary: 내 재료함 조회
      description: 사용자의 재료함 정보 조회
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      responses:
        '200':
          description: 재료함 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserIngredientList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - UserIngredient
      summary: 내 재료함 업데이트
      description: 유저 재료 업데이트 (재료함 전체 교체)
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ingredientIds
              properties:
                ingredientIds:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: 업데이트 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - UserIngredient
      summary: 재료 추가/수정
      description: 재료함에 재료 추가 또는 수정
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ingredientIds
              properties:
                ingredientIds:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        '201':
          description: 재료 추가 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/me/ingredients/{ingredientId}:
    delete:
      tags:
        - UserIngredient
      summary: 재료 삭제

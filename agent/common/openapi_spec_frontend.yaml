openapi: 3.0.3
info:
  title: Mealio Client API
  description: |
    Next.js Route Handler API

    ## 환경 변수
    | 변수 | 용도 |
    |------|------|
    | `NEXT_PUBLIC_API_BASE_URL` | 백엔드 API base URL. 비어 있으면 same-origin으로 `POST /api/v1/auth/refresh` 호출 |
    | `REVALIDATE_SECRET` | `POST /api/revalidate` 웹훅 secret (서버 전용) |
    | `INTERNAL_API_SECRET` | SSR·빌드 시 producer `X-Internal-Api-Secret` 헤더 (서버 전용, producer `INTERNAL_API_SECRET`과 동일) |
  version: 1.0.0
  contact:
    name: API Support
    email: tkddnr10222@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://app.example.com
    description: Production (Vercel)
  - url: http://localhost:4000
    description: Local development server

tags:
  - name: Authentication
    description: SSR 세션 갱신 브리지
  - name: ISR
    description: 온디맨드 ISR 재검증 웹훅

paths:
  /api/auth/refresh-bridge:
    get:
      tags:
        - Authentication
      summary: SSR 토큰 갱신 브리지
      description: |
        SSR(Server Component)에서 백엔드 API 호출이 **401**일 때 브라우저를 이 경로로 리다이렉트한다.
        들어온 `Cookie` 헤더를 그대로 백엔드 `POST /api/v1/auth/refresh`에 전달하고,
        응답 `Set-Cookie`를 브라우저로 복사한 뒤 최종 목적지로 302 리다이렉트한다.

        - **성공**: `next` 쿼리(상대 경로)로 302 + 갱신된 JWT 쿠키
        - **실패**(refresh 4xx/5xx 또는 네트워크 오류): `/login?sessionExpired=1&next=...`로 302

        `next`는 `/`로 시작하는 단일 슬래시 상대 경로만 허용한다(`//` 등은 `/`로 대체).
        호출부는 `buildSsrRefreshBridgeUrl()`(`client/src/lib/auth/routes.ts`)로 URL을 조립한다.
      operationId: getAuthRefreshBridge
      security: []
      parameters:
        - name: next
          in: query
          required: false
          description: refresh 성공 후 복귀할 앱 내 상대 경로 (`/`로 시작, `//` 금지). 미지정 시 `/`
          schema:
            type: string
            example: /recipe/36
        - name: refreshed
          in: query
          required: false
          description: |
            SSR refresh 재시도 가드 플래그. `buildSsrRefreshBridgeUrl()`이 `1`을 붙인다.
            Route Handler는 이 값을 읽지 않으며, 브리지 진입 URL 조립용으로만 사용된다.
          schema:
            type: string
            enum: ['1']
      responses:
        '302':
          description: refresh 성공 시 `next`로, 실패 시 로그인 페이지로 리다이렉트
          headers:
            Location:
              description: 복귀 경로 또는 `/login?sessionExpired=1&next=...`
              schema:
                type: string
                examples:
                  success:
                    summary: refresh 성공
                    value: /recipe/36
                  failure:
                    summary: refresh 실패
                    value: /login?sessionExpired=1&next=%2Frecipe%2F36
            Set-Cookie:
              description: 백엔드 refresh 응답의 JWT HttpOnly 쿠키(accessToken, refreshToken)
              schema:
                type: string

  /api/revalidate:
    post:
      tags:
        - ISR
      summary: 온디맨드 ISR 재검증
      description: |
        지정한 앱 경로의 ISR 캐시를 즉시 무효화한다.
        백엔드·관리 도구에서 데이터 변경 후 호출하는 웹훅이다.

        - 본문 `secret`은 서버 환경 변수 `REVALIDATE_SECRET`과 일치해야 한다.
        - 본문 `path`는 `/`로 시작하는 앱 상대 경로여야 하며, `..`·`//` 등 경로 조작 패턴은 거부한다.
        - 성공 시 `revalidatePath(path)`를 호출한다.
        - 레시피 상세(`/recipe/[id]`)는 `ISR_FETCH_ON_DEMAND`(`next.revalidate: false`) 온디맨드 ISR의 주요 사용처이며, 주기 ISR(`ISR_FETCH_PERIODIC`, 300초) 페이지와 병행한다.
      operationId: postRevalidatePath
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevalidateRequest'
            examples:
              recipeDetail:
                summary: 레시피 36 상세 재검증
                value:
                  secret: your-revalidate-secret
                  path: /recipe/36
      responses:
        '200':
          description: 재검증 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevalidateSuccessResponse'
              example:
                ok: true
                revalidated: true
                path: /recipe/36
                now: 1710000000000
        '400':
          description: 잘못된 JSON 본문 또는 `path` 유효성 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteHandlerErrorResponse'
              examples:
                invalidJson:
                  summary: JSON 파싱 실패
                  value:
                    ok: false
                    error: Invalid JSON body
                invalidPath:
                  summary: path 유효성 실패
                  value:
                    ok: false
                    error: Invalid path
        '401':
          description: secret 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteHandlerErrorResponse'
              example:
                ok: false
                error: Invalid secret
        '500':
          description: | 
            `REVALIDATE_SECRET` 미설정
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteHandlerErrorResponse'
              example:
                ok: false
                error: Revalidation is not configured

components:
  schemas:
    RouteHandlerErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
      example:
        ok: false
        error: Invalid secret

    RevalidateRequest:
      type: object
      required: [secret, path]
      properties:
        secret:
          type: string
          description: 서버 환경 변수 `REVALIDATE_SECRET`과 동일한 값
          minLength: 1
        path:
          type: string
          description: |
            재검증할 앱 상대 경로. `/`로 시작해야 하며 `..`·`//` 등 경로 조작 패턴은 거부한다.
            끝의 `/`는 루트(`/`)를 제외하고 제거한다.
          minLength: 1
          pattern: '^/(?!/)'
          example: /recipe/36

    RevalidateSuccessResponse:
      type: object
      required: [ok, revalidated, path, now]
      properties:
        ok:
          type: boolean
          enum: [true]
        revalidated:
          type: boolean
          enum: [true]
        path:
          type: string
          description: 재검증된 앱 경로
          example: /recipe/36
        now:
          type: integer
          format: int64
          description: 재검증 시각 (Unix epoch ms)

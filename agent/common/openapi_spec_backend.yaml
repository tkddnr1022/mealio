openapi: 3.0.3
info:
  title: Recipe Service API
  description: |
    레시피 추천 및 재료 관리 서비스 API
    
    ## 인증 방식
    - Cookie 기반 인증 (HttpOnly, Secure, SameSite=Lax)
    - 소셜 로그인: 백엔드 주도 OAuth. 클라이언트는 GET /api/v1/auth/{provider} 진입만 하며, 이후 리다이렉트·토큰 교환·JWT 발급은 백엔드에서 처리
    
    ## 주요 기능
    - 소셜 로그인 (카카오, 구글, 네이버)
    - 레시피 조회 및 검색
    - 사용자 재료 관리
    - AI 챗봇 레시피 추천
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.example.com
    description: Production server
  - url: https://staging-api.example.com
    description: Staging server
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Authentication
    description: 인증 관련 API
  - name: User
    description: 사용자 관련 API
  - name: Recipe
    description: 레시피 관련 API
  - name: Ingredient
    description: 재료 관련 API
  - name: Inventory
    description: 사용자 재료함 관련 API
  - name: Chatbot
    description: AI 챗봇 관련 API
  - name: Internal
    description: 내부 API

security:
  - cookieAuth: []

paths:
  /api/v1/auth/{provider}:
    get:
      tags:
        - Authentication
      summary: OAuth 로그인 진입 (소셜)
      description: |
        백엔드 주도 OAuth 진입. 클라이언트가 이 URL로 이동(또는 리다이렉트)하면 서버가 Provider 인증 페이지로 302 리다이렉트한다.
        인증 완료 후 Provider가 백엔드 콜백 URL로 리다이렉트하고, 백엔드가 Code 교환·JWT 발급 후 프론트 최종 경로(검증된 `next` 또는 기본 성공 경로)로 302 + Set-Cookie로 응답한다.
        Client ID, Secret, Scope, Redirect URI는 백엔드에서만 관리한다.
      operationId: getAuthProvider
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          description: OAuth Provider 식별자
          schema:
            type: string
            enum: [google, kakao, naver]
        - name: next
          in: query
          required: false
          description: 로그인 완료 후 이동할 프론트엔드 상대 경로 (`/`로 시작하는 경로만 허용)
          schema:
            type: string
      responses:
        '302':
          description: Provider 인증 URL로 리다이렉트 (Location 헤더)
          headers:
            Location:
              description: Provider 인증 페이지 URL
              schema:
                type: string
                example: "https://accounts.google.com/o/oauth2/v2/auth?client_id=..."
        '400':
          description: 잘못된 provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/{provider}/callback:
    get:
      tags:
        - Authentication
      summary: OAuth 콜백 (Provider → 백엔드)
      description: |
        Provider 인증 완료 후 Provider가 리다이렉트하는 백엔드 URL.
        클라이언트가 직접 호출하지 않으며, GET /api/v1/auth/{provider} 진입 후 브라우저가 Provider를 거쳐 이 URL로 이동한다.
        서버가 Authorization Code로 Access Token 교환 → 사용자 정보 조회 → 사용자 생성/조회 → JWT 발급 후
        성공 시 프론트 앱의 최종 경로(`FRONTEND_APP_BASE_URL` + 검증된 상대 경로 또는 `FRONTEND_OAUTH_DEFAULT_SUCCESS_PATH`)로 302 리다이렉트하며,
        실패 시 `FRONTEND_APP_BASE_URL` + `FRONTEND_OAUTH_ERROR_PATH`로 302 하고 오류 쿼리를 붙인다.
        성공 응답에 Set-Cookie로 accessToken/refreshToken을 함께 전달한다.
      operationId: getAuthProviderCallback
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          description: OAuth Provider 식별자 (진입 시 사용한 값과 동일)
          schema:
            type: string
            enum: [google, kakao, naver]
        - name: code
          in: query
          required: false
          description: Provider가 전달하는 Authorization Code
          schema:
            type: string
        - name: state
          in: query
          required: false
          description: CSRF 방지용 state (진입 시 서버가 생성해 전달한 값)
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: Provider OAuth 표준 오류 코드
          schema:
            type: string
        - name: error_description
          in: query
          required: false
          description: Provider OAuth 표준 오류 설명
          schema:
            type: string
        - name: next
          in: query
          required: false
          description: 성공/실패 리다이렉트 시 프론트로 전달할 상대 경로 (`/` 시작, `//` 금지)
          schema:
            type: string
      responses:
        '302':
          description: |
            OAuth 처리 결과에 따라 프론트엔드 URL로 리다이렉트.
            - 성공: 최종 앱 경로로 302 + Set-Cookie(accessToken, refreshToken). `next`는 서버에서 안전한 상대 경로로 검증된 값만 반영.
            - 실패: `FRONTEND_OAUTH_ERROR_PATH`로 302 (`errorCode`, `errorMessage`, optional `next` 쿼리 포함)
          headers:
            Location:
              description: 프론트엔드 리다이렉트 URL (성공 또는 실패 URL)
              schema:
                type: string
                example: "https://app.example.com"
            Set-Cookie:
              description: accessToken(Path=/) + refreshToken(Path=/) 쿠키 (HttpOnly, Secure, SameSite=Lax)
              schema:
                type: string
                example: "accessToken=eyJhbGc...; Path=/; HttpOnly; Secure; SameSite=Lax, refreshToken=session.secret; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=1209600"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: 토큰 갱신
      description: |
        HttpOnly `refreshToken` 쿠키(opaque token)를 검증해 Access/Refresh 토큰을 회전 발급한다.
        검증의 SSOT는 DB(Prisma)이며, Redis는 세션 조회 캐시로 사용된다.
      security:
        - refreshCookieAuth: []
      parameters:
        - name: refreshToken
          in: cookie
          required: true
          description: Opaque refresh token
          schema:
            type: string
      responses:
        '200':
          description: 토큰 갱신 성공
          headers:
            Set-Cookie:
              description: 갱신된 accessToken(Path=/) + refreshToken(Path=/) 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: 로그아웃
      description: 로그아웃 및 쿠키 삭제
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      responses:
        '204':
          description: 로그아웃 성공
          headers:
            Set-Cookie:
              description: accessToken/refreshToken 쿠키 삭제
              schema:
                type: string
                example: "accessToken=; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=0, refreshToken=; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=0"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me:
    get:
      tags:
        - User
      summary: 내 프로필 조회
      description: 현재 로그인한 사용자의 프로필 정보 조회
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      responses:
        '200':
          description: 프로필 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/me/nickname:
    patch:
      tags:
        - User
      summary: 닉네임 수정
      description: 사용자 닉네임 수정
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nickname
              properties:
                nickname:
                  type: string
                  minLength: 2
                  maxLength: 20
                  description: 새로운 닉네임
            example:
              nickname: "요리왕"
      responses:
        '200':
          description: 닉네임 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  nickname:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/me/activities:
    get:
      tags:
        - User
      summary: 내 활동 내역 조회
      description: 현재 로그인한 사용자의 활동 내역을 최신순으로 조회 (커서 기반 페이지네이션)
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
        - name: limit
          in: query
          required: false
          description: 한 페이지당 항목 수 (기본 20, 최대 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          required: false
          description: 다음 페이지 커서 (이전 응답의 nextCursor, ISO occurredAt)
          schema:
            type: string
            maxLength: 64
        - name: types
          in: query
          required: false
          description: 이벤트 타입 필터
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: 활동 내역 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserActivityList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes:
    get:
      tags:
        - Recipe
      summary: 레시피 목록 조회
      description: 페이지네이션을 지원하는 레시피 목록 조회
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: accessToken
          in: cookie
          required: false
          description: JWT 액세스 토큰 (선택사항)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: page
          in: query
          description: 페이지 번호
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: 페이지 크기
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: difficulty
          in: query
          description: 난이도 필터 (1~5)
          schema:
            type: array
            items:
              type: integer
              minimum: 1
              maximum: 5
          style: form
          explode: false
        - name: cookTimeMin
          in: query
          description: 최소 조리시간 (분)
          schema:
            type: integer
            minimum: 1
        - name: cookTimeMax
          in: query
          description: 최대 조리시간 (분)
          schema:
            type: integer
            minimum: 1
        - name: sort
          in: query
          description: 정렬 기준
          schema:
            type: string
            enum: [latest, cookTime, difficulty, viewCount, likeCount]
            default: latest
      responses:
        '200':
          description: 레시피 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/recommended:
    get:
      tags:
        - Recipe
      summary: 개인화 추천 레시피 조회
      description: |
        PostgreSQL 추천 SSOT를 기준으로 사용자 맞춤 레시피를 조회합니다.
        응답은 rank 오름차순(1이 가장 높은 우선순위)으로 반환됩니다.
      security:
        - cookieAuth: []
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰 (필수)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: limit
          in: query
          description: 반환할 추천 개수 (기본 10, 최대 10)
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 10
      responses:
        '200':
          description: 추천 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeRecommendationItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/categories:
    get:
      tags:
        - Recipe
      summary: 레시피 카테고리 목록 조회
      description: 활성화된 레시피 카테고리 목록 조회
      security:
        - cookieAuth: []
        - {}
      responses:
        '200':
          description: 레시피 카테고리 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeCategory'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/static-ids:
    get:
      tags:
        - Recipe
      summary: 정적 경로 생성용 레시피 ID 목록 조회
      description: 공개 레시피 ID를 인기순(조회수 + 좋아요 수 합산, 동점 시 조회수·좋아요·id 내림차순)으로 정렬해 경량 응답으로 반환한다. Next.js `generateStaticParams`에서 사용한다.
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: accessToken
          in: cookie
          required: false
          description: JWT 액세스 토큰 (선택사항)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: size
          in: query
          description: 반환할 ID 개수
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: integer
                      format: int64
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/summaries:
    post:
      tags:
        - Recipe
      summary: 레시피 요약 정보 벌크 조회
      description: ID 목록으로 레시피 요약 정보(RecipeSummary)를 한 번에 조회. 목록·검색 등에서 벌크로 카드 정보를 채울 때 사용.
      security:
        - cookieAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                    format: int64
                  maxItems: 100
                  example: [1, 2, 3]
      responses:
        '200':
          description: 조회 성공 (요청한 ID 중 존재·공개된 레시피만 반환)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/{recipeId}:
    get:
      tags:
        - Recipe
      summary: 레시피 상세 조회
      description: 특정 레시피의 상세 정보 조회(조회 전용, activity 이벤트 미발행)
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: accessToken
          in: cookie
          required: false
          description: JWT 액세스 토큰 (선택사항)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: recipeId
          in: path
          required: true
          description: 레시피 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 레시피 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/{recipeId}/views:
    post:
      tags:
        - Recipe
      summary: 레시피 조회수 증가 이벤트 기록
      description: |
        레시피 상세 페이지 진입 시 호출한다.
        `recipe.view` activity 이벤트를 발행하며, 서버 dedupe 정책(로그인 사용자는 `userId`, 비로그인은 `ipAddress` 기준, IP 미확인 시 `unknown-ip`)의 30분 윈도우로 중복 이벤트를 차단한다.
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: accessToken
          in: cookie
          required: false
          description: JWT 액세스 토큰 (선택사항)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: recipeId
          in: path
          required: true
          description: 레시피 ID
          schema:
            type: integer
            format: int64
      responses:
        '202':
          description: 이벤트 수락(중복 요청은 무시될 수 있음)
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/{recipeId}/search-clicks:
    post:
      tags:
        - Recipe
      summary: 검색 결과 클릭 이벤트 기록
      description: |
        레시피 검색 결과 목록에서 카드 클릭 시 호출한다.
        `search.click` activity 이벤트를 발행하며, KPI `kpi_search_click_rate` 분자 및 추천 보정(+0.25, 로그인·recipe 엔티티)에 사용된다.
        서버 dedupe 정책(로그인 사용자는 `userId`, 비로그인은 `ipAddress` 기준, IP 미확인 시 `unknown-ip`)의 30분 윈도우로 동일 `recipeId`·actor 조합의 중복 이벤트를 차단한다.
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: accessToken
          in: cookie
          required: false
          description: JWT 액세스 토큰 (선택사항)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: recipeId
          in: path
          required: true
          description: 레시피 ID
          schema:
            type: integer
            format: int64
      responses:

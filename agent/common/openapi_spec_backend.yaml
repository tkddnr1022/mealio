  /api/v1/chatbot/messages:
    post:
      tags:
        - Chatbot
      summary: 챗봇 대화 (SSE 스트리밍)
      description: |
        AI 챗봇과 대화하여 레시피 추천을 받습니다.
        응답은 Server-Sent Events(SSE) 스트리밍으로 전달됩니다.

        **동작 흐름**
        1. 클라이언트가 POST로 메시지 전송
        2. Producer가 Kafka에 챗봇 요청 이벤트 발행 (streamChannelId 포함)
        3. Producer가 Redis 채널(chatbot:stream:{streamChannelId}) 구독
        4. Consumer가 Kafka 메시지 처리 후 GPT 스트리밍 결과를 Redis에 발행
        5. Producer가 Redis 수신 데이터를 SSE로 클라이언트에 전달
        6. done/error 이벤트 수신 시 스트림 종료

        **SSE 이벤트 형식** (Content-Type: text/event-stream)
        - data: { "type": "chunk", "data": "텍스트 조각" }
        - data: { "type": "done", "data": { "conversationId", "isCreditDepleted", "message?", "suggestedRecipes?" } }
        - data: { "type": "error", "data": { "message": "오류 메시지" } }
      parameters:
        - name: accessToken
          in: cookie
          required: true
          description: JWT 액세스 토큰
          schema:
            type: string
          example: "{{apiKey}}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: 사용자 메시지
                conversationId:
                  type: string
                  description: 기존 대화 ID (선택사항)
            example:
              message: "오늘 저녁으로 뭘 해먹을까요?"
              conversationId: "conv_abc123"
      responses:
        '200':
          description: SSE 스트림 (대화 응답이 스트리밍됨)
          headers:
            Content-Type:
              schema:
                type: string
                example: "text/event-stream"
            Cache-Control:
              schema:
                type: string
                example: "no-cache"
            Connection:
              schema:
                type: string
                example: "keep-alive"
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  각 줄은 "data: {JSON}\n\n" 형식.
                  type=chunk(텍스트 조각), type=done(최종 결과: conversationId, isCreditDepleted 등), type=error(오류) 중 하나.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'


        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/recipes/search:
    get:
      tags:
        - Recipe
      summary: 레시피 검색
      description: |
        레시피 검색 (키워드·난이도·조리시간·카테고리·정렬 선택). 키워드를 생략하면 제목·설명 텍스트 검색 없이 필터·정렬만 적용합니다.
        검색 API 호출 시 `search.query` activity 이벤트를 발행하며, dedupe는 **키워드(q)만** + actor(`userId` 우선, 비로그인 `ipAddress`, 미확인 `unknown-ip`) 기준 30분 윈도우로 중복을 차단한다(필터·정렬·페이지 변경은 동일 키워드면 추가 발행 없음).
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: accessToken
          in: cookie
          required: false
          description: JWT 액세스 토큰 (선택사항)
          schema:
            type: string
          example: "{{apiKey}}"
        - name: q
          in: query
          required: false
          description: 검색 키워드 (제목·설명 부분 일치, 생략 가능)
          schema:
            type: string
            minLength: 1
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: difficulty
          in: query
          description: 난이도 필터 (1~5)
          schema:

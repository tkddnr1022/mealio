      tags:
        - Internal
      summary: 애플리케이션 liveness 체크
      description: |
        애플리케이션 프로세스가 살아있는지(liveness) 확인합니다.
        Kubernetes Liveness Probe 등에서 사용합니다.
      security: []
      responses:
        '200':
          description: 애플리케이션이 기동 중(liveness ok)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  timestamp:
                    type: string
                    format: date-time

  /ready:
    get:
      tags:
        - Internal
      summary: 애플리케이션 readiness 체크
      description: |
        애플리케이션이 트래픽을 받을 준비가 되었는지(readiness) 확인합니다.
        PostgreSQL, MongoDB, Redis 등 주요 의존성의 연결 상태를 종합해 상태를 반환합니다.
      security: []
      responses:
        '200':
          description: 의존성 상태에 따른 readiness 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  timestamp:
                    type: string
                    format: date-time
                  details:
                    type: object
                    properties:
                      app:
                        type: string
                        enum: [ok, degraded]
                      postgres:
                        type: string
                        enum: [ok, degraded, unknown]
                      mongodb:
                        type: string
                        enum: [ok, degraded, unknown]
                      redis:
                        type: string
                        enum: [ok, degraded, unknown]

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: JWT access token이 포함된 HttpOnly 쿠키 (Path=/)
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refreshToken
      description: Opaque refresh token이 포함된 HttpOnly 쿠키 (Path=/)

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 사용자 ID
        email:
          type: string
          format: email
          description: 이메일
        nickname:
          type: string
          description: 닉네임
        creditBalance:
          type: integer
          description: 남은 챗봇 크레딧
        creditMonthlyLimit:
          type: integer
          description: 월간 크레딧 상한(표시·정책용)
      example:
        id: 123
        email: user@example.com
        nickname: 요리왕
        creditBalance: 750
        creditMonthlyLimit: 1000

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            createdAt:
              type: string
              format: date-time
              description: 가입일시

    UserActivityItem:
      type: object
      required: [id, type, occurredAt]
      properties:
        id:
          type: string
        type:
          type: string
        occurredAt:
          type: string
          format: date-time

    UserActivityList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserActivityItem'
        nextCursor:
          type: string
          nullable: true

    RecipeSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          maxLength: 100
        description:
          type: string
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          description: 난이도 (1~5)
        cookTime:
          type: integer
          description: 조리시간 (분)
        imageUrl:
          type: string
          format: uri
          nullable: true
        servings:
          type: integer
          description: 인분 수
        viewCount:
          type: integer
          description: 조회수
        likeCount:
          type: integer
          description: 좋아요 수
        isPublished:
          type: boolean
          description: 공개 여부
        createdAt:
          type: string
          format: date-time
      example:
        id: 456
        title: 김치볶음밥
        description: 간단하고 맛있는 김치볶음밥
        difficulty: 1
        cookTime: 15
        imageUrl: https://example.com/images/recipe456.jpg
        viewCount: 1240
        likeCount: 180
        createdAt: "2025-01-10T10:30:00Z"

    RecipeRecommendationItem:
      type: object
      required: [recipe, rank, score, calculatedAt]
      properties:
        recipe:
          $ref: '#/components/schemas/RecipeSummary'
        rank:
          type: integer
          minimum: 1
          description: 사용자 추천 순위 (1이 최상위)
        score:
          type: number
          format: float
          description: 추천 종합 점수 (정규화 전 내부 점수)
        reason:
          type: string
          nullable: true
          description: 추천 근거 요약 (예 - 관심 재료 일치, 즐겨찾기 기반)
        calculatedAt:
          type: string
          format: date-time
          description: 추천 점수 계산 시각(SSOT 갱신 시각)
      example:
        recipe:
          id: 456
          title: 김치볶음밥
          description: 간단하고 맛있는 김치볶음밥
          difficulty: 1
          cookTime: 15
          imageUrl: https://example.com/images/recipe456.jpg
          servings: 2
          viewCount: 1240
          likeCount: 180
          isPublished: true
          createdAt: "2025-01-10T10:30:00Z"
        rank: 1
        score: 0.92
        reason: 관심 재료와 조리시간 선호가 일치합니다.
        calculatedAt: "2026-05-19T00:00:00Z"

    FavoriteRecipeIdsResponse:
      type: object
      required:
        - favoriteRecipeIds
      properties:
        favoriteRecipeIds:
          type: array
          description: 관심 레시피 ID 목록
          items:
            type: integer
            format: int64
      example:
        favoriteRecipeIds: [101, 202]

    RecipeNutrition:
      type: object
      description: 1인분 기준 영양 정보 (외부 레시피 API INFO_* 필드 대응)
      properties:
        calories:
          type: number
          format: float
          nullable: true
          description: 열량 (kcal)
        carbohydrates:
          type: number
          format: float
          nullable: true
          description: 탄수화물 (g)
        protein:
          type: number
          format: float
          nullable: true
          description: 단백질 (g)
        fat:
          type: number
          format: float
          nullable: true
          description: 지방 (g)
        sodium:
          type: number
          format: float
          nullable: true
          description: 나트륨 (mg)

    RecipeDetail:
      allOf:
        - $ref: '#/components/schemas/RecipeSummary'
        - type: object
          properties:
            categoryId:
              type: integer
              format: int64
              description: 레시피 카테고리 ID
            categoryName:
              type: string
              description: 레시피 카테고리 표시명
            cookingMethod:
              type: string
              nullable: true
              description: 조리 방법 (예 - 찌기, 볶기)
            dishType:
              type: string
              nullable: true
              description: 요리 종류 (예 - 반찬, 국)
            nutrition:
              $ref: '#/components/schemas/RecipeNutrition'
              nullable: true
            cookingTip:
              type: string
              nullable: true
              description: 저감·건강 조리 팁
            source:
              type: string
              nullable: true
              description: 데이터 출처 식별자
            sourceRecipeId:
              type: string
              nullable: true
              description: 출처별 레시피 ID
            instructions:
              type: array
              items:
                type: object
                properties:
                  step:
                    type: integer
                  content:
                    type: string
                  imageUrl:
                    type: string
                    format: uri
                    nullable: true
            ingredients:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
                  amount:
                    type: number
                    format: float
                  unit:
                    type: string
                  isOptional:
                    type: boolean

    RecipeCategory:
      type: object
      properties:
        id:
          type: integer
          format: int64
        key:
          type: string
          maxLength: 50
          description: 불변 카테고리 키
          example: KOREAN
        name:
          type: string
          maxLength: 100
          description: 카테고리 표시명
          example: 한식
        displayOrder:
          type: integer
          description: 카테고리 노출 정렬 순서
          example: 1
        isActive:
          type: boolean
          description: 카테고리 사용 여부
          example: true
      example:
        id: 1
        key: KOREAN
        name: 한식
        displayOrder: 1
        isActive: true

    Ingredient:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 100
        categoryId:
          type: integer
          description: 재료 카테고리 ID
      example:
        id: 789
        name: 양파
        categoryId: 1

    IngredientCategory:
      type: object
      properties:
        id:
          type: integer
          format: int64
        key:
          type: string
          maxLength: 50
          description: 불변 카테고리 키
          example: VEGETABLE
        name:
          type: string
          maxLength: 100
          description: 카테고리 표시명
          example: 채소
        displayOrder:
          type: integer
          description: 카테고리 노출 정렬 순서
          example: 1
        isActive:
          type: boolean
          description: 카테고리 사용 여부
          example: true
      example:
        id: 1
        key: VEGETABLE
        name: 채소
        displayOrder: 1
        isActive: true

    InventoryEntry:
      type: object
      required:
        - id
        - name
        - categoryId
        - categoryName
      properties:
        id:
          type: integer
          format: int64
          description: 재료 ID
        name:
          type: string
          description: 재료명
        categoryId:
          type: integer
          format: int64
          nullable: true
          description: 재료 카테고리 ID (마스터에 없는 ID는 null)
        categoryName:
          type: string
          nullable: true
          description: 재료 카테고리명 (마스터에 없는 ID는 null)

    InventoryResponse:
      type: object
      properties:
        ownedIngredients:
          type: array
          description: 보유 재료 (id, name, categoryId, categoryName)
          items:
            $ref: '#/components/schemas/InventoryEntry'
        favoriteIngredients:
          type: array
          description: 관심 재료 (id, name, categoryId, categoryName)
          items:
            $ref: '#/components/schemas/InventoryEntry'
        favoriteRecipes:
          type: array
          description: 관심 레시피 목록
          items:
            $ref: '#/components/schemas/RecipeSummary'

    SuggestedRecipeSummary:
      type: object
      description: 챗봇이 제안하는 레시피 요약 (스트림 done·대화 히스토리 메시지 등)
      required: [id, title, categoryId, categoryName]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        categoryId:
          type: integer
          format: int64
          description: 레시피 카테고리 ID
        categoryName:
          type: string
          description: 레시피 카테고리 표시명
        imageUrl:
          type: string
          nullable: true
          description: 대표 이미지 URL
        cookTime:
          type: integer
          nullable: true
          description: 조리 시간(분)
        difficulty:
          type: integer
          nullable: true
          description: 난이도(1-5)

    ChatbotResponse:
      type: object
      properties:
        conversationId:
          type: string
        message:
          type: string
        suggestedRecipes:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SuggestedRecipeSummary'
      example:
        conversationId: conv_abc123
        message: 김치볶음밥은 어떠세요? 집에 있는 재료로 15분이면 완성할 수 있습니다.
        suggestedRecipes:
          - id: 456
            title: 김치볶음밥
            categoryId: 1
            categoryName: 한식
            imageUrl: https://cdn.example.com/recipes/456.jpg
            cookTime: 15
            difficulty: 2

    ConversationHistory:
      type: object
      description: 대화 히스토리 (assistant 메시지에 추천이 있으면 suggestedRecipes 요약 배열 포함)
      properties:
        conversationId:
          type: string
        title:
          type: string
          nullable: true
          description: 대화 제목 (메타 컬렉션). 없으면 null
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant, system]
              message:
                type: string
              suggestedRecipes:
                type: array
                nullable: true
                description: 추천 레시피 요약 (assistant 메시지, Mongo context.suggestedRecipes와 동일 형태)
                items:
                  $ref: '#/components/schemas/SuggestedRecipeSummary'
              createdAt:
                type: string
                format: date-time

    ConversationList:
      type: object
      description: 해당 유저의 대화 목록 (conversationId 목록, 최신 대화 순)
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              conversationId:
                type: string
                description: 대화 ID
              title:
                type: string
                nullable: true
                description: 대화 제목 (메타 컬렉션). 없으면 null
              updatedAt:
                type: string
                format: date-time
                description: 대화 메타 최종 갱신 시각
        nextCursor:
          type: string
          nullable: true
          description: |
            다음 페이지가 있으면 값이 있으며, 다음 요청의 cursor 파라미터로 사용.
            형식 `{updatedAt}::{conversationId}` (ISO 8601 + 대화 ID)

    EventLog:
      type: object
      required:
        - type
        - actor
      properties:
        type:
          type: string
          description: |
            이벤트 타입
        actor:
          type: object
          properties:
            type:
              type: string
              description: 이벤트 주체 타입 (user, system, admin)
            userId:
              type: integer
              format: int64
            ipAddress:
              type: string
            userAgent:
              type: string
        entity:
          type: object
          nullable: true
          properties:
            type:
              type: string
            id:
              type: integer
              format: int64
            name:
              type: string
        payload:
          type: object
          nullable: true
        metadata:
          type: object
          nullable: true
          properties:
            platform:
              type: string
            version:
              type: string
            source:
              type: string
            referrer:
              type: string
            extra:
              type: object
              additionalProperties: true

    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
      example:
        page: 1
        size: 20
        total: 150
        totalPages: 8

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              nullable: true
      example:
        error:
          code: VALIDATION_ERROR
          message: Invalid request parameters
          details:
            field: nickname
            issue: Length must be between 2 and 20 characters

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: BAD_REQUEST
              message: Invalid request parameters

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Authentication required

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found

    TooManyRequests:
      description: 요청 횟수 제한 초과
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Too many requests. Please try again later.

    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: INTERNAL_SERVER_ERROR
              message: An unexpected error occurred
          schema:
            type: integer
            minimum: 1
        - name: categoryId
          in: query
          description: 레시피 카테고리 ID (GET /api/v1/recipes/categories 응답의 id)
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: cookingMethod
          in: query

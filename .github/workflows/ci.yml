name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm run ci:install

      - name: Lint
        run: pnpm run ci:lint:client

      - name: Build
        run: pnpm run ci:build:client

      - name: Test
        run: pnpm run ci:test:client

  server:
    name: Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm run ci:install

      - name: Build @mealio/shared
        run: pnpm run ci:build:shared

      - name: Lint producer
        run: pnpm run ci:lint:producer

      - name: Lint consumer
        run: pnpm run ci:lint:consumer

      - name: Build producer
        run: pnpm run ci:build:producer

      - name: Build consumer
        run: pnpm run ci:build:consumer

      - name: Test producer
        run: pnpm run ci:test:producer

      - name: Test consumer
        run: pnpm run ci:test:consumer

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter mealio-docs...

      - name: Typecheck
        run: pnpm --filter mealio-docs typecheck

      - name: Build
        run: pnpm run ci:build:docs

  # Vercel handles client release builds & Sentry source map uploads

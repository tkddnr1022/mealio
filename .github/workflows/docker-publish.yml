name: Docker Publish

# Runs after CI succeeds on main/master, or manually via workflow_dispatch.
# Required repository secrets:
#   DOCKERHUB_USERNAME — Docker Hub account name
#   DOCKERHUB_TOKEN    — Docker Hub access token (Settings → Security → Access Tokens)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  changes:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.workflow_run.head_sha }}^
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            server:
              - docker/Dockerfile.producer
              - docker/Dockerfile.consumer
              - server/producer/**
              - server/consumer/**
              - server/shared/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - .github/workflows/docker-publish.yml

  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: changes
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
        (needs.changes.result == 'success' && needs.changes.outputs.server == 'true'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: producer
            dockerfile: docker/Dockerfile.producer
            image: mealio-producer
          - service: consumer
            dockerfile: docker/Dockerfile.consumer
            image: mealio-consumer
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

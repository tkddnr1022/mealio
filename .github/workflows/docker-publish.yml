name: Docker Publish

# Runs after CI succeeds on main/master, or manually via workflow_dispatch.
# Pushes multi-arch manifest lists (linux/amd64, linux/arm64) for Intel/AMD and Graviton EC2.
# Required repository secrets:
#   DOCKERHUB_USERNAME — Docker Hub account name
#   DOCKERHUB_TOKEN    — Docker Hub access token (Settings → Security → Access Tokens)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  changes:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.set-server.outputs.server }}
    steps:
      - if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      # Compare since the previous successful CI run (not just HEAD^) so multi-commit pushes
      # and server changes in an earlier commit are not missed.
      - if: github.event_name == 'workflow_run'
        name: Resolve diff base
        id: base
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          PREV=$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f branch="$BRANCH" \
            -f status=completed \
            -f per_page=20 \
            --jq "[.workflow_runs[] | select(.conclusion == \"success\" and .head_sha != \"$HEAD_SHA\")][0].head_sha // empty")
          if [ -z "$PREV" ]; then
            PREV=$(git rev-parse HEAD^)
          fi
          echo "sha=$PREV" >> "$GITHUB_OUTPUT"

      - if: github.event_name == 'workflow_run'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.base.outputs.sha }}
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            server:
              - docker/Dockerfile.producer
              - docker/Dockerfile.consumer
              - server/producer/**
              - server/consumer/**
              - server/shared/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - .github/workflows/docker-publish.yml

      - name: Set server output
        id: set-server
        env:
          FILTER_RESULT: ${{ steps.filter.outputs.server }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "server=true" >> "$GITHUB_OUTPUT"
          else
            echo "server=${FILTER_RESULT}" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: producer
            dockerfile: docker/Dockerfile.producer
            image: mealio-producer
          - service: consumer
            dockerfile: docker/Dockerfile.consumer
            image: mealio-consumer
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

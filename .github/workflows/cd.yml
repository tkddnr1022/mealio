name: CD

# Runs after Docker Publish succeeds on main/master.
# Required repository secrets:
#   EC2_HOST    — EC2 public hostname or IP
#   EC2_USER    — SSH user (e.g. ubuntu, ec2-user)
#   EC2_SSH_KEY — PEM private key for EC2 SSH access
# Optional repository variable:
#   EC2_DEPLOY_PATH — project root on EC2 (default: ~/mealio)

on:
  workflow_run:
    workflows: [Docker Publish]
    types: [completed]
    branches: [main, master]

concurrency:
  group: cd-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      EC2_DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH }}
    steps:
      - name: Deploy producer and consumer on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          EC2_DEPLOY_PATH: ${{ env.EC2_DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: EC2_DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            cd "${EC2_DEPLOY_PATH:-$HOME/mealio}"
            git pull
            docker compose --env-file server/producer/.env.docker.development.local -f docker/compose-producer.yml up -d --pull always
            docker compose --env-file server/consumer/.env.docker.development.local -f docker/compose-consumer.yml up -d --pull always
            docker system prune -a -f

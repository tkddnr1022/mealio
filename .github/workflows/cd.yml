name: CD

# Runs after Docker Publish succeeds on main/master.
# Required repository secrets:
#   AWS_ACCESS_KEY_ID     — IAM credentials with ssm:SendCommand on the target instance
#   AWS_SECRET_ACCESS_KEY — corresponding secret key
#   AWS_REGION            — e.g. ap-northeast-2
#   EC2_INSTANCE_ID       — target EC2 instance ID (e.g. i-0123456789abcdef0)
# Optional repository variables:
#   EC2_DEPLOY_PATH — project root on EC2 (default: /home/ubuntu/mealio)
#   EC2_USER        — Linux user that owns the repo (default: ubuntu)
#
# EC2 prerequisites:
#   - SSM Agent running (preinstalled on Amazon Linux / Ubuntu AMIs)
#   - Instance profile with AmazonSSMManagedInstanceCore (or equivalent SSM permissions)
#   - IAM user/role used by this workflow: ssm:SendCommand, ssm:GetCommandInvocation

on:
  workflow_run:
    workflows: [Docker Publish]
    types: [completed]
    branches: [main, master]

concurrency:
  group: cd-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      EC2_DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH || '/home/ubuntu/mealio' }}
      EC2_USER: ${{ vars.EC2_USER || 'ubuntu' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy producer and consumer on EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DEPLOY_PATH: ${{ env.EC2_DEPLOY_PATH }}
          RUN_AS_USER: ${{ env.EC2_USER }}
        run: |
          set -euo pipefail

          PARAMS=$(jq -n \
            --arg user "$RUN_AS_USER" \
            --arg path "$DEPLOY_PATH" \
            '{commands: ["sudo -u \($user) -H bash -lc \"set -euo pipefail && cd \($path) && git pull && docker compose --env-file server/producer/.env.docker.development.local -f docker/compose-producer.yml up -d --pull always && docker compose --env-file server/consumer/.env.docker.development.local -f docker/compose-consumer.yml up -d --pull always && docker system prune -a -f\""]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "mealio CD deploy ${{ github.event.workflow_run.head_sha }}" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command ID: $COMMAND_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "::error::SSM command failed with status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --output json
                exit 1
                ;;
              *) sleep 10 ;;
            esac
            if [ "$i" -eq 60 ]; then
              echo "::error::SSM command timed out after 10 minutes"
              exit 1
            fi
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status, StandardOutputContent, StandardErrorContent]' \
            --output text

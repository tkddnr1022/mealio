name: mealio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-common-env: &app-common-env
  NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
  METRICS_ENABLED: ${METRICS_ENABLED:?METRICS_ENABLED is required}
  POSTGRESQL_URL: ${POSTGRESQL_URL:?POSTGRESQL_URL is required}
  MONGODB_URL: ${MONGODB_URL:?MONGODB_URL is required}
  REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
  KAFKA_BROKERS: ${KAFKA_BROKERS:?KAFKA_BROKERS is required}
  SLOW_QUERY_THRESHOLD_MS: ${SLOW_QUERY_THRESHOLD_MS:?SLOW_QUERY_THRESHOLD_MS is required}
  LOG_SAMPLE_RATE: ${LOG_SAMPLE_RATE:?LOG_SAMPLE_RATE is required}
  TRACE_SAMPLE_RATE: ${TRACE_SAMPLE_RATE:?TRACE_SAMPLE_RATE is required}

services:
  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      args:
        APP: producer
    container_name: mealio-producer
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:${PORT:?PORT is required}:${PORT:?PORT is required}"
    environment:
      <<: *app-common-env
      PORT: ${PORT:?PORT is required}
      KAFKA_CLIENT_ID: mealio-producer
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ACCESS_TOKEN_TTL_SEC: ${ACCESS_TOKEN_TTL_SEC:?ACCESS_TOKEN_TTL_SEC is required}
      REFRESH_TOKEN_TTL_SEC: ${REFRESH_TOKEN_TTL_SEC:?REFRESH_TOKEN_TTL_SEC is required}
      REFRESH_TOKEN_BYTES: ${REFRESH_TOKEN_BYTES:?REFRESH_TOKEN_BYTES is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:?KAKAO_CLIENT_ID is required}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:?KAKAO_CLIENT_SECRET is required}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:?NAVER_CLIENT_ID is required}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:?NAVER_CLIENT_SECRET is required}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:?OAUTH_CALLBACK_BASE_URL is required}
      FRONTEND_APP_BASE_URL: ${FRONTEND_APP_BASE_URL:?FRONTEND_APP_BASE_URL is required}
      FRONTEND_OAUTH_ERROR_PATH: ${FRONTEND_OAUTH_ERROR_PATH:?FRONTEND_OAUTH_ERROR_PATH is required}
      FRONTEND_OAUTH_DEFAULT_SUCCESS_PATH: ${FRONTEND_OAUTH_DEFAULT_SUCCESS_PATH:?FRONTEND_OAUTH_DEFAULT_SUCCESS_PATH is required}
      SENTRY_DSN_PRODUCER: ${SENTRY_DSN_PRODUCER:?SENTRY_DSN_PRODUCER is required}
    networks:
      - mealio-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.PORT;fetch('http://127.0.0.1:'+p+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      args:
        APP: consumer
    container_name: mealio-consumer
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *app-common-env
      KAFKA_CLIENT_ID: mealio-consumer
      METRICS_PORT: ${METRICS_PORT:?METRICS_PORT is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:?OPENAI_CHAT_MODEL is required}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:?OPENAI_EMBEDDING_MODEL is required}
      OPENAI_BATCH_MODEL: ${OPENAI_BATCH_MODEL:?OPENAI_BATCH_MODEL is required}
      PUBLIC_DATA_API_KEY: ${PUBLIC_DATA_API_KEY:?PUBLIC_DATA_API_KEY is required}
      SENTRY_DSN_CONSUMER: ${SENTRY_DSN_CONSUMER:?SENTRY_DSN_CONSUMER is required}
    networks:
      - mealio-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.METRICS_PORT;fetch('http://127.0.0.1:'+p+'/metrics').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  mealio-net:
    driver: bridge

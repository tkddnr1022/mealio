name: mealio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mealio-kafka-ui
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${KAFKA_UI_PORT:?KAFKA_UI_PORT is required}:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME:?KAFKA_UI_CLUSTER_NAME is required}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_UI_BOOTSTRAP_SERVERS:?KAFKA_UI_BOOTSTRAP_SERVERS is required}
    networks:
      - mealio-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  mealio-net:
    name: mealio-net

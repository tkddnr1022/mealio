name: mealio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mongodb:
    image: mongo:8.2.3
    container_name: mealio-mongodb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${MONGODB_MEMORY_LIMIT:?MONGODB_MEMORY_LIMIT is required}
    logging: *default-logging
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    volumes:
      - mongo_data:/data/db
    networks:
      - mealio-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo_data:

networks:
  mealio-net:
    name: mealio-net

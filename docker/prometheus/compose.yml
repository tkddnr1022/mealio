# PROMETHEUS_*_TARGET — .env.docker에서 host:port 스크랩 대상 지정
# 기본: producer:9100 / consumer:9101 / pushgateway:9091 — 호스트 개발 시 host.docker.internal:포트
name: mealio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-timezone: &timezone
  TZ: Asia/Seoul

services:
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: mealio-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${PROMETHEUS_MEMORY_LIMIT:?PROMETHEUS_MEMORY_LIMIT is required}
    logging: *default-logging
    ports:
      - "${PROMETHEUS_PORT:?PROMETHEUS_PORT is required}:9090"
    environment:
      <<: *timezone
      PROMETHEUS_PRODUCER_TARGET: ${PROMETHEUS_PRODUCER_TARGET:?PROMETHEUS_PRODUCER_TARGET is required}
      PROMETHEUS_CONSUMER_TARGET: ${PROMETHEUS_CONSUMER_TARGET:?PROMETHEUS_CONSUMER_TARGET is required}
      PROMETHEUS_PUSHGATEWAY_TARGET: ${PROMETHEUS_PUSHGATEWAY_TARGET:?PROMETHEUS_PUSHGATEWAY_TARGET is required}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        sed -e "s/__PROMETHEUS_PRODUCER_TARGET__/$$PROMETHEUS_PRODUCER_TARGET/" \
            -e "s/__PROMETHEUS_CONSUMER_TARGET__/$$PROMETHEUS_CONSUMER_TARGET/" \
            -e "s/__PROMETHEUS_PUSHGATEWAY_TARGET__/$$PROMETHEUS_PUSHGATEWAY_TARGET/" \
            /etc/prometheus/prometheus.yml > /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.enable-lifecycle
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mealio-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  prometheus_data:

networks:
  mealio-net:
    name: mealio-net

name: mealio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-timezone: &timezone
  TZ: Asia/Seoul

services:
  client:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.client
      extra_hosts:
        - host.docker.internal:host-gateway
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:?INTERNAL_API_BASE_URL is required}
        NEXT_PUBLIC_API_PREFIX: ${NEXT_PUBLIC_API_PREFIX:?NEXT_PUBLIC_API_PREFIX is required}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:?NEXT_PUBLIC_GA_MEASUREMENT_ID is required}
        NEXT_PUBLIC_SENTRY_ENABLED: ${NEXT_PUBLIC_SENTRY_ENABLED:?NEXT_PUBLIC_SENTRY_ENABLED is required}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:?NEXT_PUBLIC_SENTRY_DSN is required}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    container_name: mealio-client
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:?MEMORY_LIMIT is required}
    logging: *default-logging
    ports:
      - "${PORT:?PORT is required}:${PORT:?PORT is required}"
    environment:
      <<: *timezone
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      PORT: ${PORT:?PORT is required}
      HOSTNAME: 0.0.0.0
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:?INTERNAL_API_BASE_URL is required}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?REVALIDATE_SECRET is required}
    networks:
      - mealio-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.PORT;fetch('http://127.0.0.1:'+p+'/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  mealio-net:
    name: mealio-net

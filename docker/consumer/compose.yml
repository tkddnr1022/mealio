name: mealio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-timezone: &timezone
  TZ: Asia/Seoul

services:
  consumer:
    image: ${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME is required}/mealio-consumer:latest
    build:
      context: ../..
      dockerfile: docker/Dockerfile.consumer
    container_name: mealio-consumer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:?MEMORY_LIMIT is required}
    logging: *default-logging
    environment:
      <<: *timezone
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      METRICS_ENABLED: ${METRICS_ENABLED:?METRICS_ENABLED is required}
      POSTGRESQL_URL: ${POSTGRESQL_URL:?POSTGRESQL_URL is required}
      MONGODB_URL: ${MONGODB_URL:?MONGODB_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      KAFKA_BROKERS: ${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:?KAFKA_CLIENT_ID is required}
      METRICS_PORT: ${METRICS_PORT:?METRICS_PORT is required}
      SLOW_QUERY_THRESHOLD_MS: ${SLOW_QUERY_THRESHOLD_MS:?SLOW_QUERY_THRESHOLD_MS is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:?OPENAI_CHAT_MODEL is required}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:?OPENAI_EMBEDDING_MODEL is required}
      OPENAI_BATCH_MODEL: ${OPENAI_BATCH_MODEL:?OPENAI_BATCH_MODEL is required}
      PUBLIC_DATA_API_KEY: ${PUBLIC_DATA_API_KEY:?PUBLIC_DATA_API_KEY is required}
      SENTRY_ENABLED: ${SENTRY_ENABLED:?SENTRY_ENABLED is required}
      SENTRY_DSN_CONSUMER: ${SENTRY_DSN_CONSUMER:?SENTRY_DSN_CONSUMER is required}
    networks:
      - mealio-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.METRICS_PORT;fetch('http://127.0.0.1:'+p+'/metrics').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  mealio-net:
    name: mealio-net

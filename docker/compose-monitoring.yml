# PROMETHEUS_TARGETS_MODE=host → 호스트 producer/consumer (개발)
# PROMETHEUS_TARGETS_MODE=compose → compose-producer/compose-consumer 컨테이너 스크랩 (프로덕션)
name: mealio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  pushgateway:
    image: prom/pushgateway:v1.10.0
    container_name: mealio-pushgateway
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:${PUSHGATEWAY_PORT:?PUSHGATEWAY_PORT is required}:9091"
    networks:
      - mealio-net

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: mealio-prometheus
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:?PROMETHEUS_PORT is required}:9090"
    environment:
      PROMETHEUS_TARGETS_MODE: ${PROMETHEUS_TARGETS_MODE:?PROMETHEUS_TARGETS_MODE is required}
      PROMETHEUS_PRODUCER_PORT: ${PROMETHEUS_PRODUCER_PORT:?PROMETHEUS_PRODUCER_PORT is required}
      PROMETHEUS_CONSUMER_PORT: ${PROMETHEUS_CONSUMER_PORT:?PROMETHEUS_CONSUMER_PORT is required}
      PUSHGATEWAY_PORT: ${PUSHGATEWAY_PORT:?PUSHGATEWAY_PORT is required}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        if [ "$$PROMETHEUS_TARGETS_MODE" = "host" ]; then
          sed -e "s/host.docker.internal:3000/host.docker.internal:$$PROMETHEUS_PRODUCER_PORT/" \
              -e "s/host.docker.internal:9091/host.docker.internal:$$PROMETHEUS_CONSUMER_PORT/" \
              -e "s/host.docker.internal:9093/host.docker.internal:$$PUSHGATEWAY_PORT/" \
              /etc/prometheus/prometheus.host.yml > /tmp/prometheus.yml
        else
          sed -e "s/producer:3000/producer:$$PROMETHEUS_PRODUCER_PORT/" \
              -e "s/consumer:9091/consumer:$$PROMETHEUS_CONSUMER_PORT/" \
              /etc/prometheus/prometheus.yml > /tmp/prometheus.yml
        fi
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.enable-lifecycle
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/prometheus.host.yml:/etc/prometheus/prometheus.host.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mealio-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  grafana:
    image: grafana/grafana:11.5.2
    container_name: mealio-grafana
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:${GRAFANA_PORT:?GRAFANA_PORT is required}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: https://github.com/haohanyang/mongodb-datasource/releases/download/v0.5.0/haohanyang-mongodb-datasource-0.5.0.zip;haohanyang-mongodb-datasource
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: haohanyang-mongodb-datasource
      SLACK_OPS_WEBHOOK_URL: ${SLACK_OPS_WEBHOOK_URL:?SLACK_OPS_WEBHOOK_URL is required}
      SLACK_PRODUCT_WEBHOOK_URL: ${SLACK_PRODUCT_WEBHOOK_URL:?SLACK_PRODUCT_WEBHOOK_URL is required}
      GRAFANA_MONGODB_HOST: ${GRAFANA_MONGODB_HOST:?GRAFANA_MONGODB_HOST is required}
      GRAFANA_MONGODB_USER: ${GRAFANA_MONGODB_USER:?GRAFANA_MONGODB_USER is required}
      GRAFANA_MONGODB_PASSWORD: ${GRAFANA_MONGODB_PASSWORD:?GRAFANA_MONGODB_PASSWORD is required}
      GRAFANA_MONGODB_DATABASE: ${GRAFANA_MONGODB_DATABASE:?GRAFANA_MONGODB_DATABASE is required}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - mealio-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  prometheus_data:
  grafana_data:

networks:
  mealio-net:
    name: mealio-net

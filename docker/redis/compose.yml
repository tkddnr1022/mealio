name: mealio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-timezone: &timezone
  TZ: Asia/Seoul

services:
  redis:
    image: redis:7.2-alpine
    container_name: mealio-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:?REDIS_MEMORY_LIMIT is required}
    logging: *default-logging
    ports:
      - "${REDIS_EXTERNAL_PORT:?REDIS_EXTERNAL_PORT is required}:6379"
    environment:
      <<: *timezone
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --maxmemory
      - ${REDIS_MAXMEMORY:?REDIS_MAXMEMORY is required}
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - mealio-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping | grep -q PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:

networks:
  mealio-net:
    name: mealio-net

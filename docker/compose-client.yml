name: mealio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_API_PREFIX: ${NEXT_PUBLIC_API_PREFIX:-/api/v1}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
        NEXT_PUBLIC_SENTRY_ENABLED: ${NEXT_PUBLIC_SENTRY_ENABLED:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    container_name: mealio-client
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:${CLIENT_PORT:?CLIENT_PORT is required}:${CLIENT_PORT:?CLIENT_PORT is required}"
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      PORT: ${CLIENT_PORT:?CLIENT_PORT is required}
      HOSTNAME: 0.0.0.0
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?REVALIDATE_SECRET is required}
    networks:
      - mealio-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.PORT;fetch('http://127.0.0.1:'+p+'/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  mealio-net:
    driver: bridge
